{% extends "base.html" %}
{% block content %}

<section class="hero" style="padding-bottom:0;">
  <div class="container stack">
    <span class="eyebrow">e-VOLK</span>
    <h1>{{ t.contact.hero_title }}</h1>
  </div>
</section>

<section class="section">
  <div class="container grid-2" style="align-items:flex-start;">
    <div class="reveal">
      <div class="media-frame media-frame--wide">
        <picture><source srcset="{{ base_path }}/assets/img/contacte-team.webp" type="image/webp">
        <img src="{{ base_path }}/assets/img/contacte-team.jpg" alt="Equipo de ingeniería de e-VOLK trabajando en el desarrollo del prototipo" width="1536" height="1178" loading="lazy"></picture>
      </div>
    </div>

    <form class="card stack reveal" data-contact-form
          data-success-text="{{ t.contact.success_text }}"
          data-error-text="{{ t.contact.error_text }}"
          novalidate>

      <div>
        <label class="field" style="margin-bottom:10px;">
          <span>{{ t.contact.option_label }} *</span>
        </label>
        <div class="option-toggle">
          <input type="radio" name="interest" id="opt-informed" value="keep_informed" required>
          <label for="opt-informed">{{ t.contact.option1 }}</label>
          <input type="radio" name="interest" id="opt-invest" value="invest" required>
          <label for="opt-invest">{{ t.contact.option2 }}</label>
        </div>
      </div>

      <div class="form-grid">
        <div class="field full">
          <label for="email">{{ t.contact.field_email }} *</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="field full">
          <label for="message">{{ t.contact.field_message }} *</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <div class="field full">
          <label for="phone">{{ t.contact.field_phone }}</label>
          <input type="tel" id="phone" name="phone" autocomplete="tel">
        </div>
      </div>

      <!-- Honeypot: invisible to real visitors (off-screen, unreachable by tab,
           never autofilled). Bots that blindly fill every field trip this. -->
      <div class="honeypot-field" aria-hidden="true">
        <label for="hp_website">{{ t.contact.honeypot_label }}</label>
        <input type="text" id="hp_website" name="website" tabindex="-1" autocomplete="off" data-honeypot>
      </div>
      <input type="hidden" name="submitted_at" data-submitted-at>

      <div class="consent-row">
        <input type="checkbox" id="consent" name="consent" required>
        <label for="consent">{{ t.contact.consent_label }} <a href="{{ base_path }}/{{ locale }}/privacy.html" target="_blank" rel="noopener">{{ t.footer.privacy }} ↗</a></label>
      </div>

      <p class="form-note">{{ t.contact.required_note }}</p>

      <div class="form-status" data-form-status role="status" aria-live="polite"></div>

      <button type="submit" class="btn btn--primary" data-form-submit>{{ t.contact.submit }}</button>
    </form>
  </div>
</section>

{% endblock %}
