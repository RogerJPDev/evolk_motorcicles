{% extends "base.html" %}
{% block content %}

<section class="hero" style="padding-bottom:20px;">
  <div class="container stack">
    <span class="eyebrow">FAQ</span>
    <h1>{{ t.faq.hero_title }}</h1>
  </div>
</section>

<section class="section" style="padding-top:20px;">
  <div class="container grid-2" style="align-items:flex-start;">
    <div class="reveal" style="position:sticky; top:100px;">
      <div class="media-frame media-frame--wide">
        <picture><source srcset="{{ base_path }}/assets/img/connector-open.webp" type="image/webp">
        <img src="{{ base_path }}/assets/img/connector-open.jpg" alt="Conector Type 2 explicado" width="1254" height="1254" loading="lazy"></picture>
      </div>
    </div>
    <div class="reveal">
      <div class="faq-list">
        {% for item in t.faq.questions %}
        <details class="faq-item" {% if loop.first %}open{% endif %}>
          <summary>{{ item.q }}<span class="plus"></span></summary>
          <p>{{ item.a }}</p>
        </details>
        {% endfor %}
      </div>
    </div>
  </div>
</section>

<section class="section section--grey">
  <div class="container grid-3">
    <div class="stack reveal">
      <div class="media-frame media-frame--square">
        <picture><source srcset="{{ base_path }}/assets/img/garage-charging-2.webp" type="image/webp">
        <img src="{{ base_path }}/assets/img/garage-charging-2.jpg" alt="Carga en casa de la moto eléctrica e-VOLK en el garaje" width="726" height="726" loading="lazy"></picture>
      </div>
    </div>
    <div class="stack reveal">
      <div class="media-frame media-frame--square">
        <picture><source srcset="{{ base_path }}/assets/img/faq-charging-oportunitat.webp" type="image/webp">
        <img src="{{ base_path }}/assets/img/faq-charging-oportunitat.jpg" alt="Carga pública de la moto eléctrica e-VOLK en la ciudad" width="1127" height="1122" loading="lazy"></picture>
      </div>
    </div>
    <div class="stack reveal">
      <div class="media-frame media-frame--square">
        <picture><source srcset="{{ base_path }}/assets/img/city-parked-1.webp" type="image/webp">
        <img src="{{ base_path }}/assets/img/city-parked-1.jpg" alt="Moto eléctrica e-VOLK aparcada junto a otros vehículos en la ciudad" width="1448" height="1086" loading="lazy"></picture>
      </div>
    </div>
  </div>
</section>

{% endblock %}
