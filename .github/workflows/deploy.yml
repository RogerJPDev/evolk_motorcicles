name: Build and push to deploy branch

# Builds the static site from src/ on every push to main, then pushes the
# finished HTML/CSS/JS/images to the "hostinger-deploy" branch — a clean
# branch containing ONLY the built site (nothing else), with files sitting
# at the branch root exactly as they need to appear in Hostinger's
# public_html. Hostinger's Git integration pulls from that branch.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jinja2 pillow

      - name: Build site
        run: python3 build.py

      - name: Push build output to hostinger-deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: hostinger-deploy
          force_orphan: true
